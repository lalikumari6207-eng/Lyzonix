<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyzonix</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(-45deg,#a2d2ff,#ffc8dd,#ffafcc,#bde0fe);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* HEADER */
header{
text-align:center;
padding:20px;
}

h1{
margin:0;
font-size:40px;
}

/* LOGO */
.logo{
width:110px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* CART */
.cart{
position:fixed;
top:10px;
right:10px;
background:white;
color:black;
padding:10px;
border-radius:10px;
}

/* BUTTON */
button{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:5px;
}

/* PRODUCTS */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.card{
background:rgba(0,0,0,0.3);
padding:15px;
width:200px;
border-radius:15px;
text-align:center;
}

/* LOGIN MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.modal-content{
background:white;
color:black;
width:300px;
margin:15% auto;
padding:20px;
border-radius:10px;
text-align:center;
}

/* CHECKOUT */
.checkout{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
}

.checkout-box{
background:white;
color:black;
width:300px;
margin:10% auto;
padding:20px;
border-radius:10px;
}

input{
width:90%;
padding:8px;
margin:5px 0;
}

</style>
</head>

<body>

<!-- CART -->
<div class="cart">
🛒 Cart: <span id="cartCount">0</span><br>
<button onclick="openCheckout()">Checkout</button>
</div>

<!-- HEADER -->
<header>
<h1>Welcome to Lyzonix</h1>
<img src="logo.png" class="logo">
<br>
<button onclick="openLogin()">Login / Signup</button>
</header>

<!-- PRODUCTS -->
<div class="products">

<div class="card">
Website Builder
<button onclick="addCart()">Add</button>
</div>

<div class="card">
Mobile App
<button onclick="addCart()">Add</button>
</div>

<div class="card">
AI Tools
<button onclick="addCart()">Add</button>
</div>

<div class="card">
Design Studio
<button onclick="addCart()">Add</button>
</div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login / Signup</h3>
<input placeholder="Email">
<input placeholder="Password">
<button onclick="closeLogin()">Login</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkoutBox">
<div class="checkout-box">
<h3>Checkout</h3>

<input placeholder="Name">
<input placeholder="Address">
<input placeholder="Phone">

<button onclick="placeOrder()">Place Order</button>
<button onclick="closeCheckout()">Close</button>
</div>
</div>

<script>

let cart = 0;

function addCart(){
cart++;
document.getElementById("cartCount").innerText = cart;
}

function openLogin(){
document.getElementById("loginModal").style.display="block";
}

function closeLogin(){
document.getElementById("loginModal").style.display="none";
}

function openCheckout(){
document.getElementById("checkoutBox").style.display="block";
}

function closeCheckout(){
document.getElementById("checkoutBox").style.display="none";
}

function placeOrder(){
alert("Order Placed Successfully 🚀");
cart = 0;
document.getElementById("cartCount").innerText = cart;
closeCheckout();
}

</script>

</body>
</html>
