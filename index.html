<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyzonix</title>

<style>
/* 🌈 BACKGROUND ANIMATION */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    background: linear-gradient(-45deg, #ffafcc, #a2d2ff, #ffc8dd, #bde0fe);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    backdrop-filter: blur(10px);
}

header h1 {
    color: #fff;
}

nav a {
    color: white;
    margin: 0 12px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h2 {
    font-size: 55px;
    margin: 0;
}

.hero p {
    font-size: 18px;
    margin-top: 10px;
}

.btn {
    padding: 12px 25px;
    border: none;
    background: #fff;
    color: black;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 20px;
}

/* SECTIONS */
.section {
    padding: 60px 20px;
    text-align: center;
}

.card {
    background: rgba(0,0,0,0.25);
    padding: 20px;
    margin: 10px;
    display: inline-block;
    width: 200px;
    border-radius: 15px;
    transition: 0.5s;
}

.card:hover {
    transform: scale(1.1);
}

/* SLIDER */
.slider {
    width: 80%;
    margin: auto;
    overflow: hidden;
    border-radius: 15px;
}

.slides {
    display: flex;
    width: 300%;
    animation: slide 8s infinite;
}

.slides img {
    width: 100%;
}

@keyframes slide {
    0% {margin-left: 0;}
    33% {margin-left: -100%;}
    66% {margin-left: -200%;}
    100% {margin-left: 0;}
}

/* LOGIN MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.modal-content {
    background: white;
    color: black;
    width: 300px;
    margin: 15% auto;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

/* SCROLL ANIMATION */
.hidden {
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

footer {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<header>
    <h1>Lyzonix</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
        <a onclick="openLogin()">Login</a>
    </nav>
</header>

<!-- HERO -->
<div class="hero">
    <h2>Welcome to Lyzonix</h2>
    <p>Creative Digital Solutions, Websites & Apps</p>
    <button class="btn">Get Started</button>
</div>

<!-- SLIDER -->
<div class="section hidden">
    <h2>Our Highlights</h2>
    <div class="slider">
        <div class="slides">
            <img src="https://picsum.photos/800/300?1">
            <img src="https://picsum.photos/800/300?2">
            <img src="https://picsum.photos/800/300?3">
        </div>
    </div>
</div>

<!-- PRODUCTS -->
<div class="section hidden" id="products">
    <h2>Our Products</h2>

    <div class="card">Website Builder</div>
    <div class="card">AI Tools</div>
    <div class="card">Design Studio</div>
    <div class="card">Mobile Apps</div>
</div>

<!-- CONTACT -->
<div class="section hidden" id="contact">
    <h2>Contact Us</h2>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <input type="text" placeholder="Message"><br>
    <button class="btn" onclick="sendMsg()">Send</button>
</div>

<footer>
    © 2026 Lyzonix | All Rights Reserved
</footer>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h3>Login / Signup</h3>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="btn">Login</button>
        <button class="btn" onclick="closeLogin()">Close</button>
    </div>
</div>

<script>
// LOGIN
function openLogin() {
    document.getElementById("loginModal").style.display = "block";
}
function closeLogin() {
    document.getElementById("loginModal").style.display = "none";
}

// CONTACT
function sendMsg() {
    alert("Message sent successfully 🚀");
}

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));
</script>

</body>
</html>
