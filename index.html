<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyzonix Technologies</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#050814;color:white;}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#0b1224;
border-bottom:2px solid #1e90ff;
position:sticky;top:0;
}

h2{color:#1e90ff;}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

.btn{
background:#1e90ff;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* HERO */
.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(120deg,#050814,#0b1a33);
}

.hero h1{font-size:50px;color:#1e90ff;}
.hero p{color:#ccc;margin-top:10px;}

/* SECTION */
section{padding:50px 20px;}
.about{max-width:900px;margin:auto;color:#ccc;line-height:1.6;}

/* SERVICES */
.cards{display:none;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:20px;}
.card{
background:#0b1224;
padding:15px;
border:1px solid #1e90ff;
border-radius:10px;
cursor:pointer;
}

/* FORM */
form{
display:none;
max-width:400px;
margin:auto;
background:#0b1224;
padding:20px;
border-radius:10px;
border:1px solid #1e90ff;
}
input{
width:100%;
padding:10px;
margin:8px 0;
}
button.submit{
width:100%;
padding:10px;
background:#1e90ff;
color:white;
border:none;
cursor:pointer;
}

/* LOGIN */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.modal-box{
background:#0b1224;
padding:20px;
border-radius:10px;
width:300px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#0b1224;
border-top:2px solid #1e90ff;
}
</style>
</head>

<body>

<header>
<h2>Lyzonix</h2>
<nav>
<a href="#about">About</a>
<a href="#services">Services</a>
<button class="btn" onclick="openLogin()">Login</button>
</nav>
</header>

<div class="hero">
<h1>WELCOME TO LYZONIX</h1>
<p>IT & HR Solutions Company</p>
</div>

<section id="about">
<h2>About Us</h2>
<div class="about">
We provide IT solutions, HR services, recruitment, software development and business management systems.
</div>
</section>

<section id="services">
<h2>Services</h2>

<button class="btn" onclick="showIT()">IT Services</button>
<button class="btn" onclick="showHR()">HR Services</button>

<div id="it" class="cards">
<div class="card" onclick="openForm('Web Development')">Web Development</div>
<div class="card" onclick="openForm('App Development')">App Development</div>
<div class="card" onclick="openForm('Data Management')">Data Management</div>
</div>

<div id="hr" class="cards">
<div class="card" onclick="openForm('Hiring')">Hiring</div>
<div class="card" onclick="openForm('Staffing')">Staffing</div>
</div>
</section>

<section>
<h2>Apply Now</h2>

<form id="jobForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone" required>
<input type="text" id="service" readonly>
<button class="submit">Submit</button>
</form>
</section>

<footer>
<p>CEO: Lali Kumari</p>
</footer>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-box">
<h3>Login</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Password">

<button class="btn" onclick="signup()">Signup</button>
<button class="btn" onclick="login()">Login</button>
<button class="btn" style="background:red" onclick="closeLogin()">Close</button>
</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){
createUserWithEmailAndPassword(
auth,
document.getElementById("loginEmail").value,
document.getElementById("loginPass").value
).then(()=>alert("Signup Success"));
}

window.login = function(){
signInWithEmailAndPassword(
auth,
document.getElementById("loginEmail").value,
document.getElementById("loginPass").value
).then(()=>alert("Login Success"));
}
</script>

<script>
// UI FUNCTIONS (FULL FIXED)
function showIT(){
document.getElementById("it").style.display="grid";
document.getElementById("hr").style.display="none";
}

function showHR(){
document.getElementById("hr").style.display="grid";
document.getElementById("it").style.display="none";
}

function openForm(service){
document.getElementById("jobForm").style.display="block";
document.getElementById("service").value=service;
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

document.getElementById("jobForm").addEventListener("submit",function(e){
e.preventDefault();
alert("Application Submitted Successfully!");
});

function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
document.getElementById("loginModal").style.display="none";
}
</script>

</body>
</html>
